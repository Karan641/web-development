<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Website – Feedback</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --clr-bg: #f8f5f0;
      --clr-dark: #1a1a1a;
      --clr-accent: #c0392b;
      --clr-muted: #666;
      --ff-display: 'Playfair Display', serif;
      --ff-body: 'Source Sans 3', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--clr-bg); color: var(--clr-dark); font-family: var(--ff-body); }

    .navbar { background: var(--clr-dark) !important; border-bottom: 3px solid var(--clr-accent); }
    .navbar-brand { font-family: var(--ff-display); font-size: 1.5rem; color: #fff !important; letter-spacing: 0.02em; }
    .nav-link { color: #ccc !important; font-weight: 600; font-size: 0.9rem; letter-spacing: 0.08em; text-transform: uppercase; transition: color 0.2s; }
    .nav-link:hover, .nav-link.active { color: var(--clr-accent) !important; }
    .navbar-toggler { border-color: rgba(255,255,255,0.3); }
    .navbar-toggler-icon { filter: invert(1); }

    .page-header {
      background: var(--clr-dark);
      color: #fff;
      padding: 5rem 2rem 4rem;
      text-align: center;
    }
    .page-header h1 { font-family: var(--ff-display); font-size: clamp(2.5rem, 6vw, 4.5rem); }
    .page-header p { color: #aaa; margin-top: 0.8rem; font-size: 1.05rem; }
    .divider { width: 60px; height: 4px; background: var(--clr-accent); margin: 1.5rem auto 0; }

    .feedback-section { padding: 5rem 0; }

    .form-box {
      background: #fff;
      border-top: 4px solid var(--clr-accent);
      padding: 3rem;
      max-width: 680px;
      margin: 0 auto;
    }

    label { font-weight: 600; font-size: 0.88rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--clr-dark); display: block; margin-bottom: 0.5rem; }
    input, textarea, select {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 2px solid #e0dcd6;
      border-radius: 0;
      font-family: var(--ff-body);
      font-size: 0.97rem;
      background: var(--clr-bg);
      color: var(--clr-dark);
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--clr-accent); background: #fff; }
    textarea { resize: vertical; min-height: 140px; }

    .form-group { margin-bottom: 1.8rem; }

    .btn-submit {
      background: var(--clr-accent);
      color: #fff;
      border: none;
      padding: 0.9rem 2.8rem;
      font-family: var(--ff-body);
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      width: 100%;
    }
    .btn-submit:hover { background: #a93226; transform: translateY(-2px); }

    .success-msg {
      display: none;
      background: #e8f5e9;
      border-left: 4px solid #2e7d32;
      padding: 1rem 1.5rem;
      color: #2e7d32;
      font-weight: 600;
      margin-top: 1.5rem;
    }

    footer { background: var(--clr-dark); color: #aaa; text-align: center; padding: 2rem; font-size: 0.85rem; }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="index.html">MyWebsite</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto gap-lg-2">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link active" href="feedback.html">Feedback</a></li>
          <li class="nav-item"><a class="nav-link" href="photos.html">Photos</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <header class="page-header">
    <h1>Feedback</h1>
    <p>I'd love to hear what you think.</p>
    <div class="divider"></div>
  </header>

  <section class="feedback-section">
    <div class="container">
      <div class="form-box p-3">
        <div class="form-group">
          <label for="fname">Your Name</label>
          <input type="text" id="fname" placeholder="e.g. Aarav Sharma"/>
        </div>
        <div class="form-group">
          <label for="femail">Email Address</label>
          <input type="email" id="femail" placeholder="you@example.com"/>
        </div>
        <div class="form-group">
          <label for="frating">Rating</label>
          <select id="frating">
            <option value="">– Select a rating –</option>
            <option>⭐ 1 – Needs improvement</option>
            <option>⭐⭐ 2 – Fair</option>
            <option>⭐⭐⭐ 3 – Good</option>
            <option>⭐⭐⭐⭐ 4 – Very Good</option>
            <option>⭐⭐⭐⭐⭐ 5 – Excellent</option>
          </select>
        </div>
        <div class="form-group">
          <label for="fmessage">Your Message</label>
          <textarea id="fmessage" placeholder="Write your feedback here..."></textarea>
        </div>
        <button class="btn-submit" onclick="submitFeedback()">Send Feedback</button>
        <div class="success-msg" id="successMsg">
          ✓ Thank you! Your feedback has been received.
        </div>
      </div>
    </div>
  </section>

  <footer>
    <p class="m-2">&copy; 2025 MyWebsite. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function submitFeedback() {
      document.getElementById('successMsg').style.display = 'block';
      document.getElementById('fname').value = '';
      document.getElementById('femail').value = '';
      document.getElementById('frating').value = '';
      document.getElementById('fmessage').value = '';
    }
  </script>
</body>
</html>
