<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Website – Feedback</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #eef2f7;
      --dark: #0d1b2a;
      --accent: #2563eb;
      --accent2: #60a5fa;
      --muted: #5a6a7a;
      --white: #ffffff;
      --ff-display: 'DM Serif Display', serif;
      --ff-body: 'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); font-family: var(--ff-body); color: var(--dark); }

    .navbar { background: var(--white) !important; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
    .navbar-brand { font-family: var(--ff-display); font-size: 1.5rem; color: var(--dark) !important; }
    .navbar-brand span { color: var(--accent); }
    .nav-link { color: var(--muted) !important; font-weight: 500; font-size: 0.9rem; padding: 0.5rem 1rem !important; border-radius: 6px; transition: all 0.2s; }
    .nav-link:hover, .nav-link.active { color: var(--accent) !important; background: #eff6ff; }

    .page-hero {
      background: linear-gradient(135deg, var(--dark) 0%, #1e3a5f 100%);
      color: #fff;
      padding: 5rem 1.5rem 4rem;
      text-align: center;
    }
    .page-hero h1 { font-family: var(--ff-display); font-size: clamp(2.2rem, 5vw, 3.8rem); }
    .page-hero p { color: rgba(255,255,255,0.6); margin-top: 0.8rem; }

    .feedback-section { padding: 5rem 0; }

    .form-card {
      background: var(--white);
      border-radius: 16px;
      padding: 3rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      max-width: 660px;
      margin: 0 auto;
    }

    .form-label {
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--dark);
      margin-bottom: 0.5rem;
      display: block;
    }
    .form-control-custom {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-family: var(--ff-body);
      font-size: 0.95rem;
      background: var(--bg);
      color: var(--dark);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .form-control-custom:focus { border-color: var(--accent); background: #fff; }
    textarea.form-control-custom { resize: vertical; min-height: 130px; }
    .form-group { margin-bottom: 1.5rem; }

    .star-group { display: flex; gap: 0.4rem; flex-direction: row-reverse; justify-content: flex-end; }
    .star-group input { display: none; }
    .star-group label { font-size: 1.8rem; color: #d1d5db; cursor: pointer; transition: color 0.15s; }
    .star-group input:checked ~ label,
    .star-group label:hover,
    .star-group label:hover ~ label { color: #f59e0b; }

    .btn-submit {
      width: 100%;
      padding: 0.9rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: var(--ff-body);
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .btn-submit:hover { background: #1d4ed8; transform: translateY(-2px); }

    .success-msg {
      display: none;
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: 8px;
      padding: 1rem 1.5rem;
      color: #166534;
      font-weight: 600;
      margin-top: 1.2rem;
      text-align: center;
    }

    footer { background: var(--dark); color: rgba(255,255,255,0.5); text-align: center; padding: 2.5rem; font-size: 0.85rem; }
    footer span { color: var(--accent2); }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">My<span>Website</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto gap-1">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link active" href="feedback.html">Feedback</a></li>
          <li class="nav-item"><a class="nav-link" href="photos.html">Photos</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <header class="page-hero">
    <h1>Feedback</h1>
    <p>Share your thoughts — I'd love to hear from you.</p>
  </header>

  <section class="feedback-section">
    <div class="container p-3">
      <div class="form-card">
        <h2 style="font-family:var(--ff-display);font-size:1.8rem;margin-bottom:0.4rem;">Send a Message</h2>
        <p style="color:var(--muted);font-size:0.95rem;margin-bottom:2rem;">Fill in the form below and I'll get back to you.</p>

        <div class="form-group">
          <label class="form-label" for="fname">Full Name</label>
          <input type="text" id="fname" class="form-control-custom" placeholder="e.g. Aarav Shrestha"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="femail">Email Address</label>
          <input type="email" id="femail" class="form-control-custom" placeholder="you@example.com"/>
        </div>
        <div class="form-group">
          <label class="form-label">Your Rating</label>
          <div class="star-group">
            <input type="radio" id="s5" name="rating" value="5"/><label for="s5">★</label>
            <input type="radio" id="s4" name="rating" value="4"/><label for="s4">★</label>
            <input type="radio" id="s3" name="rating" value="3"/><label for="s3">★</label>
            <input type="radio" id="s2" name="rating" value="2"/><label for="s2">★</label>
            <input type="radio" id="s1" name="rating" value="1"/><label for="s1">★</label>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="fmsg">Your Message</label>
          <textarea id="fmsg" class="form-control-custom" placeholder="Write your feedback here..."></textarea>
        </div>
        <button class="btn-submit" onclick="submitForm()">Submit Feedback</button>
        <div class="success-msg" id="successMsg">✅ Thank you! Your feedback was submitted successfully.</div>
      </div>
    </div>
  </section>

  <footer>
    <p class="m-2">&copy; 2025 <span>MyWebsite</span>. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function submitForm() {
      document.getElementById('fname').value = '';
      document.getElementById('femail').value = '';
      document.getElementById('fmsg').value = '';
      document.querySelectorAll('input[name="rating"]').forEach(r => r.checked = false);
      document.getElementById('successMsg').style.display = 'block';
      setTimeout(() => document.getElementById('successMsg').style.display = 'none', 4000);
    }
  </script>
</body>
</html>
