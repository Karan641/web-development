<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Form</title>
</head>
<body>
    <h1>Form</h1>
    <form action="submit" method="post"> 
        <label for="username">Username:</label>
        <input type ="text" id="username"/><br>

         <label for="password">Password:</label>
        <input type ="password" id="password"/><br/>

        <label for="email">Email:</label>
        <input type ="email" id="email"/><br>

        <p>Gender</p>
        <input type="radio" id ="male" name="gender" value="MALE"/>
        <lable for ="male">Male</lable><br/>
        <input type="radio" id ="female" name="gender" value="FEMALE"/>
        <lable for ="female">Female</lable><br/>

        <label for="cars"> Choose a car:</label>
        <select name="cars" id="cars">
            <option value="" disabled value>Select Cars</option>
            <option value="volvo">Volvo</option>
            <option value="saab">Saab</option>
            <option value="mercedes">Mercedes</option>
            <option value="audi">Audi</option>
        </select>
        <br>
        <label for="fav_books">Favourite Books:</label>
        <input type="checkbox" id ="alchemist" name="Alchemist" value="Alchemist"/><label for="alchemist">Alchemist</label>
        <input type="checkbox" id="ikigai" name="Ikigai" value="Ikigai"/><label for="ikigai">Ikigai</label>
        <input type="checkbox" id="sapiens" name="sapiens1" value="sapiens"/><label for="sapiens">Sapiens</label>
        <br>
        <input type ="submit" value="Submit"/>
</body>
</html>
